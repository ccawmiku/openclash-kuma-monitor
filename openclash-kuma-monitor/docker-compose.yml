services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: openclash-uptime-kuma
    restart: unless-stopped
    ports:
      - "12301:3001"
    volumes:
      - ./data/uptime-kuma:/app/data

  checker:
    image: ghcr.io/ccawmiku/openclash-kuma-monitor:latest
    container_name: openclash-node-checker
    restart: unless-stopped
    depends_on:
      - uptime-kuma
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
